<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="400" fill="#0D1117"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BC8CFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Pattern -->
  <g opacity="0.1">
    <path d="M0 40H1280M0 80H1280M0 120H1280M0 160H1280M0 200H1280M0 240H1280M0 280H1280M0 320H1280M0 360H1280" stroke="#30363D" stroke-width="1"/>
    <path d="M40 0V400M80 0V400M120 0V400M160 0V400M200 0V400M240 0V400M280 0V400M320 0V400M360 0V400M400 0V400M440 0V400M480 0V400M520 0V400M560 0V400M600 0V400M640 0V400M680 0V400M720 0V400M760 0V400M800 0V400M840 0V400M880 0V400M920 0V400M960 0V400M1000 0V400M1040 0V400M1080 0V400M1120 0V400M1160 0V400M1200 0V400M1240 0V400" stroke="#30363D" stroke-width="1"/>
  </g>

  <!-- Title Text -->
  <text x="640" y="180" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#grad1)" text-anchor="middle" filter="url(#glow)">Awesome AI Code Editor</text>
  <text x="640" y="240" font-family="Arial, sans-serif" font-size="24" fill="#8B949E" text-anchor="middle">Curated list of the world's most powerful AI-powered IDEs &amp; Agents</text>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="100" r="5" fill="#58A6FF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="1180" cy="300" r="8" fill="#BC8CFF" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" />
  </circle>
  <path d="M200 300L250 350L300 300" stroke="#58A6FF" stroke-width="4" fill="none" opacity="0.3"/>
  <path d="M1000 100L1050 50L1100 100" stroke="#BC8CFF" stroke-width="4" fill="none" opacity="0.3"/>
  
  <!-- AI Brain/Chip Icon -->
  <g transform="translate(600, 40) scale(0.5)" opacity="0.8">
    <rect x="0" y="0" width="160" height="160" rx="20" fill="none" stroke="url(#grad1)" stroke-width="4"/>
    <circle cx="80" cy="80" r="40" fill="url(#grad1)" opacity="0.2"/>
    <path d="M40 80H120M80 40V120M60 60L100 100M100 60L60 100" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
