<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0c0d21" />
      <stop offset="100%" stop-color="#140628" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Ambient Glows -->
  <circle cx="950" cy="100" r="150" fill="#7000ff" opacity="0.25" filter="url(#glow-strong)" />
  <circle cx="200" cy="300" r="180" fill="#00f2fe" opacity="0.15" filter="url(#glow-strong)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.08">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Abstract Code & Tech Art (Left Side) -->
  <g transform="translate(80, 80)" opacity="0.85">
    <!-- Window Frame -->
    <rect x="0" y="0" width="340" height="240" rx="12" fill="#0c071e" stroke="#2c1b4d" stroke-width="2" />
    <!-- Window Dots -->
    <circle cx="20" cy="20" r="6" fill="#ff5f56" />
    <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
    <circle cx="60" cy="20" r="6" fill="#27c93f" />
    <!-- Coding lines -->
    <rect x="20" y="55" width="120" height="8" rx="4" fill="#7000ff" opacity="0.6" />
    <rect x="20" y="75" width="220" height="8" rx="4" fill="#00f2fe" opacity="0.8" />
    <rect x="40" y="95" width="180" height="8" rx="4" fill="#ffffff" opacity="0.3" />
    <rect x="40" y="95" width="180" height="8" rx="4" fill="#ffffff" opacity="0.3" />
    <rect x="40" y="115" width="240" height="8" rx="4" fill="#ffffff" opacity="0.5" />
    <rect x="60" y="135" width="140" height="8" rx="4" fill="#f355da" opacity="0.8" />
    <rect x="60" y="155" width="200" height="8" rx="4" fill="#00f2fe" opacity="0.6" />
    <rect x="40" y="175" width="100" height="8" rx="4" fill="#ffffff" opacity="0.3" />
    <rect x="20" y="195" width="80" height="8" rx="4" fill="#7000ff" opacity="0.7" />
  </g>

  <!-- Abstract AI Core / Hologram (Right Side) -->
  <g transform="translate(900, 200)">
    <!-- Concentric tech circles -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#accent-purple)" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.4" />
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#accent-cyan)" stroke-width="2" stroke-dasharray="40 10" opacity="0.6" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3" />
    
    <!-- Central AI Orb -->
    <circle cx="0" cy="0" r="35" fill="url(#accent-purple)" opacity="0.8" filter="url(#glow-strong)" />
    <circle cx="0" cy="0" r="15" fill="url(#accent-cyan)" />
    
    <!-- Orbiting nodes -->
    <circle cx="-60" cy="-60" r="6" fill="#00f2fe" filter="url(#glow-subtle)" />
    <line x1="0" y1="0" x2="-60" y2="-60" stroke="#00f2fe" stroke-width="1.5" opacity="0.5" />
    
    <circle cx="85" cy="10" r="8" fill="#f355da" filter="url(#glow-subtle)" />
    <line x1="0" y1="0" x2="85" y2="10" stroke="#f355da" stroke-width="1.5" opacity="0.5" />

    <circle cx="-20" cy="80" r="5" fill="#ffffff" filter="url(#glow-subtle)" />
    <line x1="0" y1="0" x2="-20" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Sparks & Particles -->
  <g transform="translate(480, 80)" opacity="0.7">
    <path d="M0,15 L10,10 L15,0 L20,10 L30,15 L20,20 L15,30 L10,20 Z" fill="#00f2fe" filter="url(#glow-subtle)"/>
  </g>
  <g transform="translate(820, 280)" opacity="0.6">
    <path d="M0,10 L7,7 L10,0 L13,7 L20,10 L13,13 L10,20 L7,13 Z" fill="#f355da" filter="url(#glow-subtle)"/>
  </g>
  <g transform="translate(430, 310)" opacity="0.5">
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#glow-subtle)" />
  </g>
  <g transform="translate(750, 60)" opacity="0.8">
    <path d="M0,8 L5,5 L8,0 L11,5 L16,8 L11,11 L8,16 L5,11 Z" fill="#ffffff" filter="url(#glow-subtle)"/>
  </g>

  <!-- Typography / Central Brand -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <!-- Main Title -->
    <text y="-25" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="52" fill="url(#text-grad)" letter-spacing="2">
      AWESOME AI IDE EXTENSIONS
    </text>
    
    <!-- Subtitle / Tagline -->
    <text y="25" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="20" fill="#9fa6c0" letter-spacing="4">
      CURATED LIST OF AGENTIC CODING ECOSYSTEMS
    </text>

    <!-- Version/Feature Badges inside SVG -->
    <rect x="-180" y="65" width="100" height="26" rx="13" fill="#181333" stroke="#362863" stroke-width="1"/>
    <text x="-130" y="82" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#00f2fe">
      ⚡ AGENTIC
    </text>

    <rect x="-70" y="65" width="140" height="26" rx="13" fill="#181333" stroke="#362863" stroke-width="1"/>
    <text x="0" y="82" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#f355da">
      🧠 2026 EDITION
    </text>

    <rect x="80" y="65" width="100" height="26" rx="13" fill="#181333" stroke="#362863" stroke-width="1"/>
    <text x="130" y="82" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="12" fill="#ffffff">
      🛠️ LOCAL LLM
    </text>
  </g>
</svg>
